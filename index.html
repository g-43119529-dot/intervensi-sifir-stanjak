<!doctype html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuiz Sifir Interaktif</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
</head>
<body data-template-id="__page-root" class="w-full" style="height: calc(100 * min(var(--vh, 1vh), 1vh));">
  
  <div id="particles" class="fixed inset-0 pointer-events-none z-0"></div>
  
  <button id="sound-toggle" class="fixed top-4 right-4 z-50 bg-white/10 backdrop-blur rounded-full w-10 h-10 flex items-center justify-center text-cyan-300 hover:bg-white/20" onclick="toggleSound()">🔊</button> 
  
  <div id="login-screen" class="login-screen-overlay">
  <div class="login-card animate-fade">
    <div class="login-header">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </div>
      <h1>AKADEMI MISI SIFIR</h1>
      <p class="subtitle">Log masuk sebelum bermain</p>
    </div>

    <div id="login-error-msg" class="error-box hidden"></div>

    <form id="login-form" onsubmit="return false;">
      <div class="input-group">
        <label for="login-kelas">Pilih Kelas</label>
        <select id="login-kelas" class="login-input">
          <option value="">-- Pilih Kelas --</option>
        </select>
      </div>

      <div class="input-group">
        <label for="login-nama">Pilih Nama</label>
        <select id="login-nama" class="login-input" disabled>
          <option value="">-- Pilih Nama --</option>
        </select>
      </div>

      <div class="input-group">
        <label for="login-password">Kata Laluan (Password)</label>
        <input type="password" id="login-password" class="login-input" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button type="submit" id="btn-login" class="btn-login">
        <span id="btn-login-text">LOGIN</span>
        <div id="login-spinner" class="spinner hidden"></div>
      </button>
    </form>
  </div>
</div>
  
  <div id="start-screen" class="screen z-10">
    <div class="text-center max-w-lg w-full">
      <h1 data-template-id="main-title" class="canva-text text-4xl md:text-5xl font-black neon-glow mb-4">SIFIR AIRFORCE</h1>
      <p data-template-id="subtitle" class="canva-text text-lg mb-8 opacity-80">Lawan Musuh dengan Kuasa Sifir!</p>
      <div class="flex flex-col gap-3 items-center">
        <button data-template-id="start-btn" class="canva-button btn-neon px-10 py-4 rounded-xl text-xl font-bold" onclick="startGame()">Mula Bermain</button> 
        <button data-template-id="view-fame-btn" class="canva-button px-6 py-2 rounded-lg font-medium text-sm" onclick="showHallOfFame()">Hall of Fame</button>
      </div>
    </div>
  </div>

  <div id="transition-screen" class="screen hidden z-20">
    <div class="text-center max-w-lg w-full pop-in">
      <p id="transition-emoji" class="text-6xl mb-4"></p>
      <h2 id="transition-title" class="text-3xl font-black neon-glow text-cyan-300 mb-2"></h2>
      <p id="transition-subtitle" class="text-lg text-white/80"></p>
    </div>
  </div>

  <div id="quiz-screen" class="screen hidden z-10">
    <div class="max-w-lg w-full">
      <div class="flex justify-between items-center mb-3">
        <span id="level-badge" class="px-3 py-1 rounded-full text-sm font-bold bg-cyan-500/20 text-cyan-300"></span> 
        <button class="px-3 py-1 rounded-lg text-sm font-medium bg-white/20 text-white" onclick="exitToStart()">Keluar</button>
      </div>
      <div class="w-full h-2 rounded-full bg-white/20 mb-2 overflow-hidden">
        <div id="timer-bar" class="timer-bar h-full rounded-full bg-green-400" style="width:100%"></div>
      </div>
      <p id="timer-text" class="text-right text-sm text-cyan-300 mb-3">30s</p>
      <div id="help-card" class="hidden glass rounded-xl p-3 mb-3 help-card">
        <p id="help-card-content" class="text-xs text-cyan-200 font-mono leading-relaxed"></p>
      </div>
      <div class="glass rounded-2xl p-6 mb-4 text-center">
        <p id="question-num" class="text-sm text-cyan-300 mb-2"></p>
        <h2 id="question-text" class="text-3xl font-black text-white neon-glow"></h2>
      </div>
      <div id="options" class="grid grid-cols-2 gap-3 mb-3"></div>
      <div class="flex justify-between text-sm text-cyan-200">
        <span id="score-display">Markah: 0/0</span> 
        <span id="progress-display"></span>
      </div>
    </div>
  </div>

  <div id="minigame-screen" class="screen hidden z-20">
    <canvas id="game-canvas" class="rounded-2xl"></canvas>
    <div id="game-hud" class="absolute top-4 left-4 right-4 flex justify-between items-center text-cyan-300 text-sm font-bold z-30">
      <span id="game-lives"></span> 
      <span id="game-level-hud"></span> 
      <span id="game-timer"></span> 
      <span id="game-score-hud"></span>
    </div>
    <button id="pause-btn" class="absolute top-14 left-1/2 -translate-x-1/2 z-30 bg-white/10 backdrop-blur rounded-full w-10 h-10 flex items-center justify-center text-cyan-300 hover:bg-white/20 text-lg">⏸</button>
    <div id="pause-overlay">
      <p class="text-white text-3xl font-black mb-4 neon-glow">⏸ JEDA</p>
      <button id="resume-btn" class="btn-neon px-8 py-3 rounded-xl text-white font-bold text-lg">Sambung</button>
    </div>
  </div>

  <div id="boss-screen" class="screen hidden z-20">
    <div class="text-center max-w-lg w-full">
      <div id="boss-robot" class="text-8xl mb-4 float">🤖</div>
      <p id="boss-text" class="text-xl text-white font-bold mb-6"></p>
      <div id="confetti-container" class="fixed inset-0 pointer-events-none overflow-hidden"></div>
    </div>
  </div>

  <div id="fame-screen" class="screen hidden z-10">
    <div class="text-center max-w-lg w-full">
      <h2 data-template-id="fame-title" class="canva-text text-3xl font-black neon-glow mb-4">Hall of Fame</h2>
      <input id="fame-name-input" type="text" placeholder="Nama anda..." class="w-full px-4 py-2 rounded-lg bg-white/10 text-white placeholder-cyan-300/50 mb-3 border border-cyan-300/30 focus:outline-none focus:border-cyan-400"> 
      <button data-template-id="save-fame-btn" class="canva-button btn-neon px-8 py-3 rounded-xl font-bold w-full mb-4" onclick="saveFame()">Simpan Rekod</button>
      <div class="glass rounded-xl p-4 max-h-48 overflow-y-auto mb-4 text-left">
        <div id="fame-list"></div>
      </div>
      <button data-template-id="back-home-btn" class="canva-button px-6 py-2 rounded-lg font-medium text-sm" onclick="exitToStart()">Kembali</button>
    </div>
  </div>

  <div id="feedback" class="hidden fixed inset-0 flex items-center justify-center bg-black/60 z-50">
    <div id="feedback-box" class="pop-in text-center p-8 rounded-2xl">
      <p id="feedback-text" class="text-4xl font-black"></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
  <script src="js/main.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/minigame.js"></script>
  <script src="js/halloffame.js"></script>
  
</body>
</html>
